name: Build and publish release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes body. Leave empty to use the default title-only notes.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content -Path VERSION -Raw).Trim()
          if (-not ($version -match '^\d+\.\d+\.\d+$')) {
            throw "VERSION must be in x.y.z format. Found: '$version'"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$version" >> $env:GITHUB_OUTPUT
          "release_name=V$version" >> $env:GITHUB_OUTPUT

      - name: Verify version metadata
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $constants = Get-Content -Path beszel_agent_manager\constants.py -Raw
          $versionInfo = Get-Content -Path file_version_info.txt -Raw
          $tuple = ($version -replace '\.', ', ') + ', 0'

          if ($constants -notmatch "APP_VERSION\s*=\s*`"$([regex]::Escape($version))`"") {
            throw "beszel_agent_manager/constants.py APP_VERSION does not match VERSION=$version"
          }
          if ($versionInfo -notmatch "filevers=\($tuple\)") {
            throw "file_version_info.txt filevers does not match VERSION=$version"
          }
          if ($versionInfo -notmatch "prodvers=\($tuple\)") {
            throw "file_version_info.txt prodvers does not match VERSION=$version"
          }
          if ($versionInfo -notmatch "StringStruct\('FileVersion', '$([regex]::Escape($version))'\)") {
            throw "file_version_info.txt FileVersion does not match VERSION=$version"
          }
          if ($versionInfo -notmatch "StringStruct\('ProductVersion', '$([regex]::Escape($version))'\)") {
            throw "file_version_info.txt ProductVersion does not match VERSION=$version"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard requests pystray pillow

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build standalone app
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --enable-plugin=tk-inter `
            --windows-console-mode=disable `
            --windows-icon-from-ico=BeszelAgentManager_icon.ico `
            --windows-company-name="Verhoef" `
            --windows-product-name="BeszelAgentManager" `
            --windows-file-description="BeszelAgentManager" `
            --windows-file-version="$version.0" `
            --windows-product-version="$version.0" `
            --include-package=pystray `
            --include-package=PIL `
            --include-data-files=BeszelAgentManager_icon.ico=BeszelAgentManager_icon.ico `
            --include-data-files=BeszelAgentManager_icon_512.png=BeszelAgentManager_icon_512.png `
            --output-dir=build `
            --output-filename=BeszelAgentManager.exe `
            main.py

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $distDir = (Get-ChildItem -Path build -Directory -Filter "*.dist" | Select-Object -First 1).FullName
          if (-not $distDir) {
            throw "Nuitka standalone .dist directory was not created"
          }
          if (-not (Test-Path -Path (Join-Path $distDir "BeszelAgentManager.exe"))) {
            throw "BeszelAgentManager.exe was not created in $distDir"
          }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            installer\BeszelAgentManager.iss `
            /DAppVersion="$version" `
            /DDistDir="$distDir"

      - name: Generate checksum
        shell: pwsh
        run: |
          if (-not (Test-Path -Path installer-dist\BeszelAgentManagerSetup.exe)) {
            throw "installer-dist\BeszelAgentManagerSetup.exe was not created"
          }
          $hash = Get-FileHash -Path installer-dist\BeszelAgentManagerSetup.exe -Algorithm SHA256
          "$($hash.Hash.ToLower())  BeszelAgentManagerSetup.exe" | Out-File -FilePath SHA256SUMS.txt -Encoding ascii

      - name: Create release notes
        shell: pwsh
        env:
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_NOTES_INPUT)) {
            "BeszelAgentManager v$version" | Out-File -FilePath RELEASE_NOTES.generated.md -Encoding utf8
          } else {
            $env:RELEASE_NOTES_INPUT | Out-File -FilePath RELEASE_NOTES.generated.md -Encoding utf8
          }

      - name: Verify release tag is unused
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          git fetch origin "refs/tags/$tag:refs/tags/$tag" 2>$null
          $tagExists = $false
          git rev-parse -q --verify "refs/tags/$tag" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $tagExists = $true
          }
          $global:LASTEXITCODE = 0
          if ($tagExists) {
            throw "Tag '$tag' already exists. Update VERSION before publishing a new release."
          }

          $releaseExists = $false
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }
          $global:LASTEXITCODE = 0
          if ($releaseExists) {
            throw "Release '$tag' already exists. Update VERSION before publishing a new release."
          }

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $releaseName = "${{ steps.version.outputs.release_name }}"
          gh release create $tag `
            --target $env:GITHUB_SHA `
            --title $releaseName `
            --notes-file RELEASE_NOTES.generated.md `
            installer-dist\BeszelAgentManagerSetup.exe `
            SHA256SUMS.txt
