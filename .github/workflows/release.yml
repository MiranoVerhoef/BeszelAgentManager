name: Build and publish release

on:
  pull_request:
    paths:
      - VERSION
      - RELEASE_CHANNEL
      - BeszelAgentManager.sln
      - src/**
      - tests/**
      - installer/**
      - .github/workflows/release.yml
  push:
    branches:
      - main
    paths:
      - VERSION
      - RELEASE_CHANNEL
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes body. Leave empty to use the default title-only notes.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content -Path VERSION -Raw).Trim()
          if (-not ($version -match '^\d+\.\d+\.\d+$')) {
            throw "VERSION must be in x.y.z format. Found: '$version'"
          }

          $channel = "stable"
          if (Test-Path -Path RELEASE_CHANNEL) {
            $channel = (Get-Content -Path RELEASE_CHANNEL -Raw).Trim().ToLowerInvariant()
          }
          if ([string]::IsNullOrWhiteSpace($channel)) {
            $channel = "stable"
          }

          if ($channel -eq "stable") {
            $tag = $version
            $releaseName = "V$version"
            $isPrerelease = "false"
          } elseif ($channel -match '^rc[0-9]+$') {
            $rc = $channel.ToUpperInvariant()
            $tag = "$version-$channel"
            $releaseName = "V$version $rc"
            $isPrerelease = "true"
          } else {
            throw "RELEASE_CHANNEL must be 'stable' or 'rcN' (for example rc1). Found: '$channel'"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore and test
        shell: pwsh
        run: |
          dotnet restore .\BeszelAgentManager.sln
          if ($LASTEXITCODE -ne 0) {
            throw "Solution restore failed"
          }
          dotnet test `
            .\tests\BeszelAgentManager.Core.Tests\BeszelAgentManager.Core.Tests.csproj `
            -c Release `
            --no-restore `
            -v minimal
          if ($LASTEXITCODE -ne 0) {
            throw "Core tests failed"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Prepare bundled NSSM
        shell: pwsh
        run: |
          $zip = Join-Path $PWD "build-assets\nssm-2.24.zip"
          $extract = Join-Path $PWD "build-assets\nssm-package"
          New-Item -ItemType Directory -Path build-assets -Force | Out-Null

          function Test-NssmBinary($Path) {
            $expectedSha256 = "f689ee9af94b00e9e3f0bb072b34caaf207f32dcb4f5782fc9ca351df9a06c97"
            $file = Get-Item -Path $Path
            if ($file.Length -lt 200000) {
              Write-Host "Rejected NSSM candidate because it is too small: $Path ($($file.Length) bytes)"
              return $false
            }
            $stream = [System.IO.File]::OpenRead($Path)
            try {
              $bytes = New-Object byte[] 2
              [void]$stream.Read($bytes, 0, 2)
              if (-not ($bytes[0] -eq 0x4d -and $bytes[1] -eq 0x5a)) {
                return $false
              }
            } finally {
              $stream.Dispose()
            }
            $actualSha256 = (Get-FileHash -Path $Path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualSha256 -ne $expectedSha256) {
              Write-Host "Rejected NSSM candidate because SHA-256 did not match NSSM 2.24 x64: $Path"
              return $false
            }
            return $true
          }

          function Find-UsableNssm($ArchivePath, $SourceName) {
            if (Test-Path -Path $extract) {
              Remove-Item -Path $extract -Recurse -Force
            }
            Expand-Archive -Path $ArchivePath -DestinationPath $extract -Force
            $candidates = Get-ChildItem -Path $extract -Recurse -Filter nssm.exe |
              Where-Object { $_.FullName -match "\\win64\\nssm\.exe$" } |
              Sort-Object FullName
            foreach ($candidate in $candidates) {
              Write-Host "Checked NSSM candidate from ${SourceName}: $($candidate.FullName)"
              if (Test-NssmBinary $candidate.FullName) {
                return $candidate.FullName
              }
            }
            return $null
          }

          $nssm = $null
          $repoFallback = Join-Path $PWD "vendor\nssm\nssm-2.24.zip"
          $sources = @(
            @{ Name = "official NSSM release"; Uri = "https://www.nssm.cc/release/nssm-2.24.zip" },
            @{ Name = "repository fallback"; Path = $repoFallback },
            @{ Name = "GitHub repository fallback"; Uri = "https://raw.githubusercontent.com/MiranoVerhoef/BeszelAgentManager/main/vendor/nssm/nssm-2.24.zip" }
          )

          foreach ($source in $sources) {
            try {
              if ($source.Path) {
                if (-not (Test-Path -Path $source.Path)) {
                  Write-Host "Skipping $($source.Name); file does not exist at $($source.Path)"
                  continue
                }
                Copy-Item -Path $source.Path -Destination $zip -Force
              } else {
                Invoke-WebRequest -UseBasicParsing -Uri $source.Uri -OutFile $zip
              }
              $nssm = Find-UsableNssm $zip $source.Name
              if ($nssm) {
                Write-Host "Using NSSM from $($source.Name): $nssm"
                break
              }
              Write-Host "No usable NSSM binary found in $($source.Name)"
            } catch {
              Write-Host "Failed to prepare NSSM from $($source.Name): $_"
            }
          }

          if (-not $nssm) {
            throw "Could not find a usable nssm.exe from the official NSSM release or repository fallback."
          }
          Copy-Item -Path $nssm -Destination build-assets\nssm.exe -Force
          if (-not (Test-Path -Path build-assets\nssm.exe)) {
            throw "Failed to stage bundled nssm.exe"
          }
          if (-not (Test-NssmBinary "build-assets\nssm.exe")) {
            throw "Staged nssm.exe is not a usable win64 NSSM binary"
          }

      - name: Build WinUI application
        shell: pwsh
        run: |
          $distDir = Join-Path $PWD "build\winui-dist"
          dotnet build `
            .\src\BeszelAgentManager.WinUI\BeszelAgentManager.WinUI.csproj `
            -c Release `
            -p:Platform=x64 `
            -r win-x64 `
            --self-contained true
          if ($LASTEXITCODE -ne 0) {
            throw "WinUI build failed"
          }
          $buildDir = Join-Path $PWD "src\BeszelAgentManager.WinUI\bin\x64\Release\net10.0-windows10.0.26100.0\win-x64"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null
          Copy-Item -Path (Join-Path $buildDir "*") -Destination $distDir -Recurse -Force
          Remove-Item -Path (Join-Path $distDir "BeszelAgentManager.Helper.*") -Force -ErrorAction SilentlyContinue
          Copy-Item -Path build-assets\nssm.exe -Destination (Join-Path $distDir "nssm.exe") -Force
          foreach ($required in @("BeszelAgentManager.exe", "helper\BeszelAgentManager.Helper.exe", "nssm.exe")) {
            if (-not (Test-Path -LiteralPath (Join-Path $distDir $required))) {
              throw "Published output is missing $required"
            }
          }

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $distDir = (Resolve-Path "build\winui-dist").Path
          if (-not (Test-Path -Path (Join-Path $distDir "BeszelAgentManager.exe"))) {
            throw "BeszelAgentManager.exe was not created in $distDir"
          }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            installer\BeszelAgentManager.iss `
            /DAppVersion="$version" `
            /DDistDir="$distDir"

      - name: Generate checksum
        shell: pwsh
        run: |
          if (-not (Test-Path -Path installer-dist\BeszelAgentManagerSetup.exe)) {
            throw "installer-dist\BeszelAgentManagerSetup.exe was not created"
          }
          $hash = Get-FileHash -Path installer-dist\BeszelAgentManagerSetup.exe -Algorithm SHA256
          "$($hash.Hash.ToLower())  BeszelAgentManagerSetup.exe" | Out-File -FilePath SHA256SUMS.txt -Encoding ascii

      - name: Upload PR test installer exe
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: BeszelAgentManagerSetup.exe
          path: |
            installer-dist/BeszelAgentManagerSetup.exe
            SHA256SUMS.txt
          if-no-files-found: error

      - name: Create release notes
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseName = "${{ steps.version.outputs.release_name }}"
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_NOTES_INPUT)) {
            if (Test-Path -Path RELEASE_NOTES.md) {
              Get-Content -Path RELEASE_NOTES.md -Raw | Out-File -FilePath RELEASE_NOTES.generated.md -Encoding utf8
            } else {
              $releaseName | Out-File -FilePath RELEASE_NOTES.generated.md -Encoding utf8
            }
          } else {
            $env:RELEASE_NOTES_INPUT | Out-File -FilePath RELEASE_NOTES.generated.md -Encoding utf8
          }

      - name: Verify release tag is unused
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          git fetch origin "refs/tags/$tag:refs/tags/$tag" 2>$null
          $tagExists = $false
          git rev-parse -q --verify "refs/tags/$tag" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $tagExists = $true
          }
          $global:LASTEXITCODE = 0
          if ($tagExists) {
            throw "Tag '$tag' already exists. Update VERSION before publishing a new release."
          }

          $releaseExists = $false
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }
          $global:LASTEXITCODE = 0
          if ($releaseExists) {
            throw "Release '$tag' already exists. Update VERSION before publishing a new release."
          }

      - name: Publish release
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $releaseName = "${{ steps.version.outputs.release_name }}"
          $args = @(
            "release", "create", $tag,
            "--target", $env:GITHUB_SHA,
            "--title", $releaseName,
            "--notes-file", "RELEASE_NOTES.generated.md",
            "installer-dist\BeszelAgentManagerSetup.exe",
            "SHA256SUMS.txt"
          )
          if ("${{ steps.version.outputs.is_prerelease }}" -eq "true") {
            $args += "--prerelease"
          }
          gh @args
